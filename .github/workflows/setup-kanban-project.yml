name: Setup Kanban Project

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        id: project
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Kusanali community kanban";
            const { data: user } = await github.rest.users.getByUsername({ username: owner });
            const ownerId = user.node_id;
            const existing = await github.graphql(
              `query($login: String!) {
                user(login: $login) {
                  projectsV2(first: 20) { nodes { id number title url } }
                }
              }`,
              { login: owner }
            );
            let project = existing.user.projectsV2.nodes.find((p) => p.title === title);
            if (!project) {
              const created = await github.graphql(
                `mutation($ownerId: ID!, $title: String!) {
                  createProjectV2(input: { ownerId: $ownerId, title: $title }) {
                    projectV2 { id number url }
                  }
                }`,
                { ownerId, title }
              );
              project = created.createProjectV2.projectV2;
            }
            const repoMeta = await github.rest.repos.get({ owner, repo });
            await github.graphql(
              `mutation($projectId: ID!, $repoId: ID!) {
                linkProjectV2ToRepository(input: { projectId: $projectId, repositoryId: $repoId }) {
                  repository { nameWithOwner }
                }
              }`,
              { projectId: project.id, repoId: repoMeta.data.node_id }
            );
            const fieldQuery = await github.graphql(
              `query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    field(name: "Status") {
                      ... on ProjectV2SingleSelectField { id options { id name } }
                    }
                  }
                }
              }`,
              { projectId: project.id }
            );
            const field = fieldQuery.node.field;
            for (const name of ["Todo", "In progress", "Done", "Idea"]) {
              if ((field?.options ?? []).some((o) => o.name === name)) continue;
              await github.graphql(
                `mutation($projectId: ID!, $fieldId: ID!, $name: String!) {
                  createProjectV2FieldOption(input: { projectId: $projectId, fieldId: $fieldId, name: $name }) {
                    projectV2FieldOption { id name }
                  }
                }`,
                { projectId: project.id, fieldId: field.id, name }
              );
            }
            const statusMap = { todo: "Todo", doing: "In progress", done: "Done", idea: "Idea" };
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", per_page: 100,
            });
            for (const issue of issues) {
              const body = issue.body ?? "";
              const colMatch = body.match(/\*\*column:\*\*\s*(\w+)/);
              const status = statusMap[colMatch?.[1] ?? "todo"] ?? "Todo";
              const add = await github.graphql(
                `mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                    item { id }
                  }
                }`,
                { projectId: project.id, contentId: issue.node_id }
              );
              const itemId = add.addProjectV2ItemById.item.id;
              const refreshed = await github.graphql(
                `query($projectId: ID!) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      field(name: "Status") {
                        ... on ProjectV2SingleSelectField { id options { id name } }
                      }
                    }
                  }
                }`,
                { projectId: project.id }
              );
              const opt = refreshed.node.field.options.find((o) => o.name === status);
              if (opt) {
                await github.graphql(
                  `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                      value: { singleSelectOptionId: $optionId }
                    }) { projectV2Item { id } }
                  }`,
                  {
                    projectId: project.id,
                    itemId,
                    fieldId: refreshed.node.field.id,
                    optionId: opt.id,
                  }
                );
              }
            }
            return project;
      - name: Summary
        run: echo "Project setup finished"
